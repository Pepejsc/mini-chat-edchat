<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mini Chat Seguro</title>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script type="module" crossorigin src="/mini-chat-edchat/assets/index-cAvHxlu8.js"></script>
  <link rel="stylesheet" crossorigin href="/mini-chat-edchat/assets/index-DjdxQSdQ.css">
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="login-box">
            <h2>Acceso al Chat</h2>
            <input id="email-input" type="email" placeholder="Correo electrónico" />
            <input id="password-input" type="password" placeholder="Contraseña" />
            <button id="login-btn">Ingresar</button>
            <p id="login-error" style="color: #d32f2f; font-size: 14px; display: none; text-align: center; margin-top: 5px;"></p>
        </div>
    </div>

    <div id="chat-screen" class="chat-container" style="display: none;">
        <header>
            <span>Mini Chat</span>
            <button id="logout-btn" class="logout-btn">Salir</button>
        </header>

        <div id="chat"></div>

        <div id="sticker-panel" class="sticker-panel" style="display: none;"></div>

        <div class="input-area">
            <button id="toggle-stickers-btn" class="icon-btn"> + </button>
            <input id="msg" placeholder="Escribe un mensaje" autocomplete="off" />
            <button id="send-btn" class="send-btn">➤</button>
        </div>
    </div>

</body>
</html>
